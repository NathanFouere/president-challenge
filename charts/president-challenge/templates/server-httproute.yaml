apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: president-challenge-server
  labels:
    app.kubernetes.io/name: president-challenge
    app.kubernetes.io/component: server
spec:
  parentRefs:
    - name: {{ .Values.server.httpRoute.gateway.name }}
      namespace: {{ .Values.server.httpRoute.gateway.namespace }}
  hostnames:
  {{- range .Values.server.httpRoute.hostnames }}
    - {{ . }}
  {{- end }}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /api
      backendRefs:
        - name: president-challenge-server
          port: {{ .Values.server.service.port }}