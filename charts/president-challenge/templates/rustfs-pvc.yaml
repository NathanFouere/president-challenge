apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: president-challenge-rustfs
  labels:
    app.kubernetes.io/name: president-challenge
    app.kubernetes.io/component: rustfs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.rustfs.storage.size }}
  {{- if .Values.rustfs.storage.storageClassName }}
  storageClassName: {{ .Values.rustfs.storage.storageClassName }}
  {{- end }}