apiVersion: v1
kind: ConfigMap
metadata:
  name: president-challenge-server-config
  labels:
    app.kubernetes.io/name: president-challenge
    app.kubernetes.io/component: server
data:
  NODE_ENV: "production"
  PORT: {{ .Values.server.service.targetPort | quote }}
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"
  SESSION_DRIVER: "cookie"
  DB_HOST: "president-challenge-postgres"
  DB_PORT: {{ .Values.postgres.service.port | quote }}
  DB_USER: {{ .Values.postgres.config.user | quote }}
  BUCKET_REGION: {{ .Values.rustfs.config.region | quote }}
  RUSTFS_ENDPOINT: "https://{{ index .Values.rustfs.httpRoute.apiHostnames 0 }}"
  BUCKET_NAME: {{ .Values.rustfs.config.defaultBuckets | quote }}
  CLIENT_URL: {{ .Values.server.config.clientUrl | quote }}
  DB_DATABASE: {{ .Values.postgres.config.database | quote }}