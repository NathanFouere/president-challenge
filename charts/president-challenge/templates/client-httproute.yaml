apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: president-challenge-client
  labels:
    app.kubernetes.io/name: president-challenge
    app.kubernetes.io/component: client
spec:
  parentRefs:
    - name: {{ .Values.client.httpRoute.gateway.name }}
      namespace: {{ .Values.client.httpRoute.gateway.namespace }}
  hostnames:
  {{- range .Values.client.httpRoute.hostnames }}
    - {{ . }}
  {{- end }}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: president-challenge-client
          port: {{ .Values.client.service.port }}