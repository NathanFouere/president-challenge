# Server configuration
server:
  image:
    repository: president-challenge-server
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 3333
    targetPort: 3333

  config:
    nodeEnv: "production"
    host: "0.0.0.0"
    logLevel: "info"
    sessionDriver: "cookie"

  httpRoute:
    gateway:
      name: traefik-gateway
      namespace: kube-system
    hostnames:
    - president-challenge.nathan-fouere.com

# Client configuration
client:
  image:
    repository: president-challenge-client
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000

  config:
    baseURLProxyServer: ""

  httpRoute:
    gateway:
      name: traefik-gateway
      namespace: kube-system
    hostnames:
    - president-challenge.nathan-fouere.com

# PostgreSQL configuration
postgres:
  image:
    repository: postgres
    tag: "17"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 5432
    targetPort: 5432

  config:
    user: "postgres"

  storage:
    size: 10Gi

# MinIO configuration
minio:
  image:
    repository: minio/minio
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001

  config:
    consoleAddress: ":9001"
    defaultBuckets: "president-challenge"

  storage:
    size: 10Gi
    # storageClassName: standard

  httpRoute:
    gateway:
      name: traefik-gateway
      namespace: kube-system
    apiHostnames:
    - minio-president-challenge.nathan-fouere.com
    consoleHostnames:
    - minio-console-president-challenge.nathan-fouere.com

secrets:
  name: "president-challenge-secrets"
  keys:
    appKey: "app-key"
    postgresPassword: "postgres-password"
    postgresDatabase: "postgres-database"
    minioRootUser: "minio-root-user"
    minioRootPassword: "minio-root-password"
