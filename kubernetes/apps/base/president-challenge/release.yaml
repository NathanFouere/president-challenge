apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: president-challenge
  namespace: president-challenge
spec:
  releaseName: president-challenge
  chart:
    spec:
      chart: president-challenge
      sourceRef:
        kind: HelmRepository
        name: president-challenge
  interval: 50m
  install:
    remediation:
      retries: 3
